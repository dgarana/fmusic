name: CI

on:
  push:
    tags-ignore: ['**']  # tags are handled by build.yml
  pull_request:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

# Opt JavaScript-based actions (checkout, setup-node, ...) into the Node 24
# runtime now, ahead of GitHub's June 2026 default switch.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install (skip binaries)
        run: npm ci
        env:
          FMUSIC_SKIP_BINARIES: '1'

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
