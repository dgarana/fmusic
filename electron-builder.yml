appId: dev.dgara.fmusic
publish:
  provider: github
  owner: dgarana
  repo: fmusic
productName: FMusic
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - 'out/**/*'
  - 'package.json'
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - '**/*'
  - from: resources/icon.png
    to: icon.png
asarUnpack:
  - 'resources/**'
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
mac:
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  # Debian policy requires a maintainer in "Name <email>" format for .deb
  # packages. Keep it here instead of in package.json so the author field
  # stays simple. Replace with a real address when distributing.
  maintainer: dgara <noreply@dgara.dev>
  target:
    - AppImage
    - deb
  category: AudioVideo
  artifactName: ${productName}-${version}.${ext}
